name: Human Approval

# Org-wide required workflow (enforced via the org ruleset "workflows" rule,
# i.e. "require workflows to pass before merging").
#
# Goal: stop bots/agents from merging their own PRs automatically. This is a
# behavioral guard, NOT a security boundary — it trusts commit-author metadata,
# which a determined actor could forge (`git config user.email ...`). That's
# acceptable: the threat model is "an autonomous agent opens a PR and it
# auto-merges with no human in the loop", not a malicious human.
#
# The job FAILS (blocking the merge) when the PR contains bot-authored commits
# and no human has approved it. It PASSES when either:
#   - every commit is authored by a human, OR
#   - a human (non-bot) reviewer has an active approving review.
#
# Enforcement is the job's own pass/fail conclusion, so the existing
# "require workflows to pass" org rule gates on it directly: no separate
# required status check is needed, and it works on fork PRs (only read scopes
# are required — no Checks API write).
#
# Subscribes to merge_group so the required workflow reports in the merge queue
# instead of stalling. There's no PR there and the gate already ran at PR time,
# so it passes.
#
# Lives in rocicorp/.github. Edit BOT_EMAILS below to add machine accounts.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed, edited]
  merge_group:

permissions: {}

# Commit-author emails to treat as bots, in addition to the generic *[bot] /
# GitHub-App detection in the script. Space-separated.
env:
  BOT_EMAILS: noreply@anthropic.com

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.number || github.event.merge_group.head_sha }}'
  cancel-in-progress: true

jobs:
  evaluate:
    name: Evaluate Human Approval
    runs-on: ubuntu-latest
    permissions:
      issues: read # Required to read PR timeline dismissal events.
      pull-requests: read # Required to read PR commits and reviews.
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            // Merge queue: no PR exists and the gate already ran at PR time, so
            // there is nothing to check — pass so the required workflow reports
            // green instead of stalling the queue.
            if (context.eventName === 'merge_group') {
              core.info(
                'merge_group event: human approval was enforced at the PR level.',
              );
              return;
            }

            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request payload; nothing to gate.');
              return;
            }

            // Extra machine-account commit emails to treat as bots, on top of
            // the generic [bot]/GitHub-App detection below.
            const BOT_EMAILS = new Set(
              (process.env.BOT_EMAILS ?? '')
                .split(/\s+/)
                .filter(Boolean)
                .map(s => s.toLowerCase()),
            );

            // A commit/review identity is a bot if GitHub resolved it to a Bot
            // account, or its login/name carries the [bot] suffix, or its commit
            // email is a known machine address. `name`/`email` come from the raw
            // git author; `ghType`/`ghLogin` from the resolved GitHub account
            // (null when the email maps to no GitHub user, e.g. Claude's).
            const looksLikeBot = (name, email, ghType, ghLogin) => {
              const n = (name ?? '').toLowerCase();
              const e = (email ?? '').toLowerCase();
              const l = (ghLogin ?? '').toLowerCase();
              return (
                ghType === 'Bot' ||
                l.endsWith('[bot]') ||
                n.endsWith('[bot]') ||
                e.includes('[bot]') ||
                BOT_EMAILS.has(e)
              );
            };

            // 1. Is any commit in the PR authored by a bot/agent? We key on the
            //    commit *author* (who wrote it), not the committer (which is
            //    often web-flow/GitHub for human edits).
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const botCommits = commits.filter(c =>
              looksLikeBot(
                c.commit?.author?.name,
                c.commit?.author?.email,
                c.author?.type,
                c.author?.login,
              ),
            );

            if (botCommits.length === 0) {
              core.info(
                `All ${commits.length} commit(s) are human-authored; ` +
                  `no human approval required.`,
              );
              return;
            }

            const botAuthors = [
              ...new Set(
                botCommits.map(
                  c =>
                    c.commit?.author?.email ||
                    c.commit?.author?.name ||
                    c.author?.login,
                ),
              ),
            ];
            core.info(
              `Bot-authored commits detected (${botCommits.length}/${commits.length}); ` +
                `authors: ${botAuthors.join(', ')}.`,
            );

            // 2. Does an active approving review from a human (non-bot) exist?
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const timelineEvents = await github.paginate(
              github.rest.issues.listEventsForTimeline,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100,
              },
            );

            const dismissedReviewIDs = new Set(
              timelineEvents
                .filter(e => e.event === 'review_dismissed')
                .map(e => e.dismissed_review?.review_id)
                .filter(id => typeof id === 'number'),
            );

            // Latest non-comment review per user (dismissed reviews excluded).
            const latestByUser = new Map();
            for (const r of reviews) {
              const login = r.user?.login;
              if (!login) continue;
              if (!['APPROVED', 'CHANGES_REQUESTED'].includes(r.state)) continue;
              if (dismissedReviewIDs.has(r.id)) continue;
              const prev = latestByUser.get(login);
              if (!prev || new Date(r.submitted_at) > new Date(prev.submitted_at)) {
                latestByUser.set(login, r);
              }
            }

            const humanApprovers = [...latestByUser.values()]
              .filter(
                r =>
                  r.state === 'APPROVED' &&
                  !looksLikeBot(undefined, undefined, r.user?.type, r.user?.login),
              )
              .map(r => r.user.login);

            if (humanApprovers.length) {
              core.info(
                `Approved by human reviewer(s): ` +
                  `${humanApprovers.map(l => '@' + l).join(', ')}.`,
              );
              return;
            }

            core.setFailed(
              `This PR has bot-authored commits (${botAuthors.join(', ')}) and no ` +
                `approving review from a human, so it cannot be merged ` +
                `automatically. A human reviewer must approve it first.`,
            );
